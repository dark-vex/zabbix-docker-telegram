name: Build docker image

on:
  workflow_dispatch:  
  push:
    branches: [ "main" ]
    paths:
      - 'release-versions/zabbix-server-7.0-latest.txt'
      - Dockerfile
      - requirements.txt

permissions:
  contents: read

jobs:
  build_zabbix_server:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Zabbix version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < release-versions/zabbix-server-7.0-latest.txt)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version string: '$VERSION'"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: 'Build:dockerimage'
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          build-args: |
            ZBX_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/dark-vex/zabbix-server-mysql:latest
            ghcr.io/dark-vex/zabbix-server-mysql:ubuntu-${{ steps.version.outputs.version }}
            ghcr.io/dark-vex/zabbix-server-mysql:${{ steps.version.outputs.version }}
            ghcr.io/dark-vex/zabbix-server-mysql:${{ steps.version.outputs.minor }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.1

      - name: Sign image
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ghcr.io/dark-vex/zabbix-server-mysql@${{ steps.build.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
